name: Bug Report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below so I can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Cave version
      description: Run `cave version` in your terminal.
      placeholder: "0.21.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what happened.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can I reproduce this?
      placeholder: |
        1. Run `cave create ...`
        2. Open the web UI
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: Where did you encounter this bug?
      options:
        - Web UI
        - CLI
        - SSH / Terminal
        - VS Code / Zed
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help - screenshots, environment details, workarounds you've tried.
